# ==========================================================
# daily.yml
# GitHub Actions
# Semiconductor Daily Report
# ==========================================================

name: Daily Semiconductor Analysis

on:

  schedule:

    # Korea 06:00
    # UTC 21:00 (Previous Day)
    - cron: '0 21 * * *'

    # Korea 16:00
    # UTC 07:00
    - cron: '0 7 * * *'

  workflow_dispatch:


jobs:

  run-analysis:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      # ====================================================
      # Checkout
      # ====================================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================================
      # Python
      # ====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ====================================================
      # Cache pip
      # ====================================================

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ====================================================
      # Install
      # ====================================================

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ====================================================
      # Run
      # ====================================================

      - name: Run Semiconductor Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

# ==========================================================
# End of daily.yml
# ==========================================================
