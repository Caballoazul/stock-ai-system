name: Daily Semiconductor Analysis

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '40 6 * * *'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests

      - name: Run analysis
        run: python ./main.py
